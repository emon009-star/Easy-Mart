<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop - EasyMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header class="header">
    <nav class="nav">
      <div class="brand">
        <img src="images/easy.jpg" alt="EasyMart Logo" class="brand-logo-img">
        <span class="brand-name">EasyMart</span>
      </div>

      <div class="header-icons">
        <input type="text" placeholder="Search products..." aria-label="Search products">
        <button title="Cart" aria-label="Cart">🛒 Cart</button>
        <button title="Login" aria-label="Login">👤 Login</button>
      </div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop.html">Shop</a>
        <a href="account.html">Account</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <!-- ================= SPECIAL OFFER ================= -->
  <section class="section">
    <div class="discount-container glass">
      <h2>🔥 Special Offer</h2>
      <p>Get 20% OFF on selected items! Use code: <strong>EASY20</strong></p>
      <a href="shop.html"><button class="add">Shop Now</button></a>
    </div>
  </section>

  <!-- ================= SEARCH & FILTER ================= -->
  <section class="section glass">
    <div class="shop-filters">
      <input type="text" placeholder="Search products..." aria-label="Search products">
      <button class="add">Search</button>
      <select>
        <option value="">All Categories</option>
        <option value="men">Men</option>
        <option value="women">Women</option>
        <option value="kids">Kids</option>
        <option value="shoes">Shoes</option>
        <option value="watches">Watches</option>
      </select>
      <select>
        <option value="">All Prices</option>
        <option value="0-25">£0 - £25</option>
        <option value="26-50">£26 - £50</option>
        <option value="51-100">£51 - £100</option>
        <option value="101-200">£101 - £200</option>
        <option value="200+">£200+</option>
      </select>
    </div>
  </section>

  <!-- ================= PRODUCTS GRID ================= -->
  <section class="section">
    <h1>All Products</h1>
    <div class="grid">

      <!-- Sample Product Card -->
      <article class="card">
        <img src="images/denim jacket.jpg" alt="Denim Jacket">
        <div class="card-body">
          <div class="title">Denim Jacket</div>
          <div class="price">£69.00</div>
          <a href="product-denim-jacket.html"><button class="add">View Product</button></a>
        </div>
      </article>

      <article class="card">
        <img src="images/casual shirt.jpg" alt="Casual Shirt">
        <div class="card-body">
          <div class="title">Casual Shirt</div>
          <div class="price">£29.00</div>
          <a href="product-casual-shirt.html"><button class="add">View Product</button></a>
        </div>
      </article>

      <article class="card">
        <img src="images/hoodie.jpg" alt="Hoodie">
        <div class="card-body">
          <div class="title">Hoodie</div>
          <div class="price">£49.00</div>
          <a href="product-hoodie.html"><button class="add">View Product</button></a>
        </div>
      </article>

      <!-- Add more products below as needed -->

    </div>
  </section>

  <!-- ================= PAGINATION ================= -->
  <section class="section" style="text-align:center;">
    <div class="pagination" style="display:flex; justify-content:center; gap:12px;">
      <a href="#" class="add">1</a>
      <a href="#" class="add">2</a>
      <a href="#" class="add">3</a>
      <a href="#" class="add">Next &raquo;</a>
    </div>
  </section>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <div class="footer-inner">
      <div>
        <div class="foot-title">Policies</div>
        <a class="foot-link" href="#">Returns</a>
        <a class="foot-link" href="#">Shipping</a>
        <a class="foot-link" href="#">Privacy</a>
      </div>
      <div>
        <div class="foot-title">Support</div>
        <a class="foot-link" href="#">FAQ</a>
        <a class="foot-link" href="contact.html">Contact</a>
      </div>
      <div>
        <div class="foot-title">Follow Us</div>
        <a class="foot-link" href="#">Instagram</a>
        <a class="foot-link" href="#">TikTok</a>
        <a class="foot-link" href="#">Facebook</a>
      </div>
    </div>
  </footer>

</body>
</html>
